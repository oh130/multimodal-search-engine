services:
  # 인프라 파트 (Gateway)
  api-gateway:
    build: ./api_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SEARCH_ENGINE_URL=http://search-engine:8002
      - REC_MODELS_URL=http://rec-models:8003
    depends_on:
      - redis
    volumes:
      - ./data:/app/data  # 공용 데이터 폴더 공유

  # B 파트 (검색)
  search-engine:
    build: ./search_engine
    ports:
      - "8002:8002"
    environment:
      - SEARCH_ENGINE_MODE=test
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface

  # C 파트 (모델)
  rec-models:
    build: ./rec_models
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface

  # 공용 DB
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # 프론트엔드
  frontend:
    build: ./pront
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  # 평가 대시보드
  dashboard:
    build: ./evaluation
    ports:
      - "8501:8501"

  # 시뮬레이터
  simulator:
    build: ./simulator
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_GATEWAY_URL=http://api-gateway:8000
    depends_on:
      - redis
      - api-gateway

volumes:
  huggingface_cache:
