simulation:
  user_pool_size: 50          # 재사용되는 가상 유저 수
  cycle_delay_seconds: 5      # 유저 세션 사이 대기(초)
  gateway_retry_seconds: 10   # API Gateway 미기동 시 재시도 간격(초)

personas:
  trendsetter:              # 트렌드세터: 다양한 카테고리, 빠른 구매
    ratio: 0.20
    search_queries:
      - "new arrivals"
      - "trending fashion"
      - "summer collection"
      - "latest styles"
      - "hot items"
    categories:
      - "Ladieswear"
      - "Menswear"
      - "Sport"
    view_prob: 0.70          # 검색 결과 클릭 확률
    cart_prob: 0.50          # 클릭 후 장바구니 확률
    purchase_prob: 0.40      # 장바구니 후 구매 확률
    inter_event_seconds: 2
    session_searches: 4      # 세션당 검색 횟수

  pragmatist:               # 실용주의자: 목적 지향, 높은 구매 전환
    ratio: 0.20
    search_queries:
      - "casual shirt"
      - "work pants"
      - "comfortable jeans"
      - "basic t-shirt"
    categories:
      - "Menswear"
      - "Ladieswear"
    view_prob: 0.50
    cart_prob: 0.60
    purchase_prob: 0.70
    inter_event_seconds: 3
    session_searches: 2

  value_seeker:             # 가성비추구: 많이 보고 적게 삼
    ratio: 0.15
    search_queries:
      - "sale"
      - "discount fashion"
      - "affordable outfit"
      - "basic clothing"
      - "jersey basic"
    categories:
      - "Divided"
      - "Ladieswear"
      - "Menswear"
    view_prob: 0.60
    cart_prob: 0.35
    purchase_prob: 0.20
    inter_event_seconds: 2
    session_searches: 5

  brand_loyal:              # 브랜드충성: 특정 카테고리 반복, 결정 시 높은 구매율
    ratio: 0.20
    search_queries:
      - "jersey basics"
      - "denim"
      - "sport wear"
      - "lingerie"
      - "dress"
    categories:
      - "Ladieswear"
      - "Menswear"
      - "Lingeries/Tights"
    view_prob: 0.55
    cart_prob: 0.70
    purchase_prob: 0.80
    inter_event_seconds: 4
    session_searches: 2

  impulse_buyer:            # 충동구매: 짧은 세션, 빠른 구매 결정
    ratio: 0.10
    search_queries:
      - "fashion"
      - "outfit"
      - "dress"
      - "jacket"
    categories:
      - "Ladieswear"
      - "Menswear"
      - "Kids"
    view_prob: 0.80
    cart_prob: 0.65
    purchase_prob: 0.60
    inter_event_seconds: 1
    session_searches: 2

  cautious_browser:         # 신중탐색: 오래 보고 거의 안 삼
    ratio: 0.15
    search_queries:
      - "quality clothing"
      - "durable fabric"
      - "coat"
      - "blazer"
      - "knitwear"
    categories:
      - "Menswear"
      - "Ladieswear"
      - "Sport"
    view_prob: 0.80
    cart_prob: 0.25
    purchase_prob: 0.10
    inter_event_seconds: 5
    session_searches: 6
